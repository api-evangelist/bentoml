tags:
- name: api v1
  description: api v1
paths:
  /api/v1/bentos:
    get:
      tags:
      - api v1
      summary: List all bentos
      operationId: List all bentos
      parameters:
      - name: count
        in: query
        schema:
          type: integer
          format: int32
      - name: q
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
          nullable: true
      - name: start
        in: query
        schema:
          type: integer
          format: int32
      - name: X-Yatai-Organization
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schemasv1BentoWithRepositoryListSchema'
  /api/v1/deployment_creation_json_schema:
    get:
      tags:
      - api v1
      summary: Get deployment creation json schema
      operationId: Get deployment creation json schema
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                description: Value of any type, including null
                nullable: true
  /api/v1/deployments:
    get:
      tags:
      - api v1
      summary: List organization deployments
      operationId: List organization deployments
      parameters:
      - name: count
        in: query
        schema:
          type: integer
          format: int32
      - name: q
        in: query
        schema:
          type: string
      - name: search
