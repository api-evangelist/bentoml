openapi: 3.0.1
info:
  title: yatai api server admin api v1 instance_types API
  description: This is yatai api server.
  version: 1.0.0
tags:
- name: instance_types
  description: instance_types
paths:
  /api/v1/instance_types:
    get:
      tags:
      - instance_types
      summary: List instance types
      operationId: List instance types
      parameters:
      - name: cluster
        in: query
        schema:
          type: string
      - name: count
        in: query
        schema:
          type: integer
          format: int32
      - name: q
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
          nullable: true
      - name: start
        in: query
        schema:
          type: integer
          format: int32
      - name: X-Yatai-Organization
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    config:
                      type: string
                      nullable: true
                    created_at:
                      type: string
                      format: date-time
                    deleted_at:
                      type: string
                      format: date-time
                      nullable: true
                    description:
                      type: string
                    display_name:
                      type: string
                    labels:
                      type: array
                      items:
                        $ref: '#/components/schemas/ModelschemasLabelItemSchema'
                    lago_id:
                      type: string
                    name:
                      type: string
                    resource_type:
                      type: string
                      enum:
                      - user
                      - organization
                      - cluster
                      - host_cluster
                      - bento_repository
                      - bento
                      - deployment
                      - deployment_revision
                      - model_repository
                      - model
                      - api_token
                    uid:
                      type: string
                    updated_at:
                      type: string
                      format: date-time
components:
  schemas:
    ModelschemasLabelItemSchema:
      type: object
      properties:
        key:
          type: string
        stage:
          type: string
        value:
          type: string
  securitySchemes:
    apiToken:
      type: apiKey
      in: header
      name: X-YATAI-API-TOKEN
